# copperhead.sh is built and deployed by Cloudflare's Git integration (Workers
# Builds) on every push to main — Cloudflare owns the build. But Git integration
# has no cron, and the GitHub/npm stats baked in at build time (src/stats.ts) go
# stale between pushes. This workflow keeps them fresh by POSTing a Workers Builds
# Deploy Hook on a 6-hourly schedule, which triggers a fresh Cloudflare
# build+deploy. The GITHUB_TOKEN the stats fetch needs lives in Cloudflare's build
# environment, not here.
#
# Requires repo secret CLOUDFLARE_DEPLOY_HOOK_URL (Cloudflare dashboard:
# Workers > this project > Settings > Build > Deploy hooks).
name: Refresh Cloudflare stats

on:
  # Manual "refresh now" from the Actions tab.
  workflow_dispatch:

  # Rebuild every 6 hours so the build-time stats stay fresh between pushes.
  # Runs at 00:00/06:00/12:00/18:00 UTC.
  schedule:
    - cron: "0 */6 * * *"

jobs:
  refresh-cloudflare:
    name: Trigger Cloudflare rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Deploy Hook
        run: curl -fsS -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}"
